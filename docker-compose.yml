services:
  # === LiveKit Server（自架）===
  livekit-server:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"   # WebSocket / HTTP
      - "7881:7881"   # RTC (TCP)
      - "50000-50100:50000-50100/udp"  # RTC (UDP)
    environment:
      - "LIVEKIT_KEYS=devkey: devsecret"

  # === Ollama LLM ===
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # === Qwen3-ASR Streaming Server（STT）===
  # 基於 QwenLM/Qwen3-ASR 的 demo_streaming.py，提供 HTTP chunk API
  # API: POST /api/start  /api/chunk  /api/finish
  qwen-asr:
    build:
      context: ./qwen-asr-server
      dockerfile: Dockerfile.gpu
    ports:
      - "8001:8001"
    volumes:
      - ./models/qwen3-asr:/model
    environment:
      - MODEL_NAME=/model/checkpoint-20340
      - PORT=8001
      - DEVICE=cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # CPU fallback（只有沒有 NVIDIA GPU 時才手動啟動）
  qwen-asr-cpu:
    build:
      context: ./qwen-asr-server
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./models/qwen3-asr:/model
    environment:
      - MODEL_NAME=/model/checkpoint-20340
      - PORT=8001
      - DEVICE=cpu
    profiles:
      - cpu-fallback

  # === Piper TTS HTTP Server ===
  piper-tts:
    build:
      context: ./piper-tts-http-server
    ports:
      - "5000:5000"
    volumes:
      - ./piper-tts-http-server/data:/data
    environment:
      - DATA_DIR=/data
      - PORT=5000

  # === Taigi Agent Worker（生產環境用，開發時直接用 uv 本機跑）===
  taigi-agent:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      - OTLP_ENDPOINT=http://tempo:4317   # 容器內用 service name，覆蓋 .env.local
    depends_on:
      - livekit-server
      - qwen-asr
      - ollama
      - piper-tts
      - tempo
    profiles:
      - production   # 預設不啟動，需明確指定：docker compose --profile production up

  # === Prometheus ===
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Linux 相容性（Mac/Windows 預設已有）

  # === Grafana Tempo（接收 OpenTelemetry traces）===
  tempo:
    image: grafana/tempo:latest
    command: ["-config.file=/etc/tempo.yml"]
    ports:
      - "4317:4317"   # OTLP gRPC（Agent 送 trace 用，開發時 localhost:4317）
      - "3200:3200"   # Tempo HTTP API（Grafana 查詢用）
    volumes:
      - ./monitoring/tempo.yml:/etc/tempo.yml
      - tempo_data:/var/tempo

  # === Grafana ===
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - tempo

volumes:
  ollama_data:
  prometheus_data:
  tempo_data:
  grafana_data:
